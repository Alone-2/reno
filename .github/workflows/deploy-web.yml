name: Deploy Web

# 触发条件:推送到 master 且改动 web 相关文件时部署;也支持手动触发
on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "scripts/deploy-web.sh"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

# 同一分支并发部署只保留最后一次,避免旧部署覆盖新部署
concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@11.9.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and test
        run: |
          pnpm exec vp check
          pnpm exec vp test

      - name: Build web
        run: pnpm --filter @reno/web run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          test -n "$SSH_PRIVATE_KEY"
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H 120.26.131.101 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'CFG'
          Host reno-deploy
              HostName 120.26.131.101
              User root
              IdentityFile ~/.ssh/id_ed25519
              IdentitiesOnly yes
              StrictHostKeyChecking yes
          CFG
          chmod 600 ~/.ssh/config

      - name: Deploy with shared script
        env:
          DEPLOY_SSH: reno-deploy
          DEPLOY_ROOT: /opt/1panel/www/sites
          DEPLOY_DIR: /opt/1panel/www/sites/reno.lijiakai.com/index
          DEPLOY_URL: https://reno.lijiakai.com/
          DEPLOY_OWNER: root
          DEPLOY_RELEASE: ${{ github.sha }}-${{ github.run_attempt }}
          SKIP_BUILD: "1"
        run: bash scripts/deploy-web.sh

      - name: Cleanup artifacts
        if: always()
        run: rm -f apps/web/reno-web-dist.tar
